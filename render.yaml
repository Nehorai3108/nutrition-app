# Render deploy config ל-BiteFit API (FastAPI).
# חיבור: render.com -> New -> Blueprint -> בחר את ה-repo. Render יקרא את הקובץ הזה.
services:
  - type: web
    name: bitefit-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # הערכים עצמם מוגדרים ב-Render Dashboard (Environment) — לא בקוד.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false   # קבע ל-URL הציבורי של השירות, למשל https://bitefit-api.onrender.com
