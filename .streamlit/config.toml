[theme]
# Light base matches the NutriSmart logo. Runtime dark mode is applied via
# injected CSS (ui/theme.set_mode) since config.toml's base is fixed at startup.
base = "light"
primaryColor = "#2d6fb3"
backgroundColor = "#eef3f9"
secondaryBackgroundColor = "#ffffff"
textColor = "#15304e"
font = "sans serif"

[client]
toolbarMode = "minimal"
showErrorDetails = true

[server]
runOnSave = true
address = "0.0.0.0"
port = 8510
