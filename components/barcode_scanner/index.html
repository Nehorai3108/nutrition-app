<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#0d0f14; font-family:sans-serif; overflow:hidden; }

#start-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; padding:24px 16px; min-height:130px;
}
#start-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; max-width:320px; padding:20px;
  background:linear-gradient(135deg,#2563eb,#4f8ef7);
  border:none; border-radius:16px; cursor:pointer;
  color:#fff; font-size:1.1rem; font-weight:700;
  box-shadow:0 6px 24px rgba(79,142,247,0.4);
  -webkit-tap-highlight-color:transparent;
}
#start-btn:active { opacity:.8; }
#start-hint { color:#8892a4; font-size:12px; direction:rtl; text-align:center; }

#scanner-screen { display:none; position:relative; width:100%; }
#video { width:100%; height:260px; object-fit:cover; display:block; background:#111; }
#overlay { position:absolute; top:0; left:0; right:0; height:260px; pointer-events:none; }
.corner { position:absolute; width:24px; height:24px; border-color:#4f8ef7; border-style:solid; }
.tl{top:14px;left:14px;border-width:3px 0 0 3px;border-radius:5px 0 0 0;}
.tr{top:14px;right:14px;border-width:3px 3px 0 0;border-radius:0 5px 0 0;}
.bl{bottom:14px;left:14px;border-width:0 0 3px 3px;border-radius:0 0 0 5px;}
.br{bottom:14px;right:14px;border-width:0 3px 3px 0;border-radius:0 0 5px 0;}
#scan-line {
  position:absolute; left:12%; width:76%; height:2px;
  background:linear-gradient(90deg,transparent,#4f8ef7,transparent);
  animation:sweep 2s ease-in-out infinite;
}
@keyframes sweep{0%,100%{top:16%}50%{top:80%}}
#scan-hint {
  position:absolute; bottom:8px; left:0; right:0;
  text-align:center; color:rgba(255,255,255,.8); font-size:12px; direction:rtl;
}
#success {
  display:none; position:absolute; top:0; left:0; right:0; height:260px;
  background:rgba(20,50,35,.95);
  flex-direction:column; align-items:center; justify-content:center; gap:8px;
}
#success.show { display:flex; }
#ok-icon { font-size:2.5rem; }
#ok-val  { font-size:1.1rem; font-weight:700; color:#68d391; direction:ltr; }
#ok-lbl  { font-size:.75rem; color:#a0aec0; direction:rtl; }
#err-msg {
  padding:10px 14px; color:#fc8181; font-size:13px; direction:rtl;
  text-align:center; display:none; background:#2d1b1b;
  border-radius:8px; margin:8px; white-space:pre-wrap;
}
</style>
</head>
<body>

<div id="start-screen">
  <button id="start-btn" onclick="openScanner()">
    <span style="font-size:1.4rem">📷</span> פתח מצלמה לסריקה
  </button>
  <div id="start-hint">לחץ פעם אחת — הסריקה תהיה אוטומטית</div>
</div>

<div id="scanner-screen">
  <video id="video" autoplay muted playsinline></video>
  <div id="overlay">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scan-line"></div>
    <div id="scan-hint">כוון את הברקוד אל המסגרת</div>
  </div>
  <div id="success">
    <div id="ok-icon">✅</div>
    <div id="ok-val"></div>
    <div id="ok-lbl">ברקוד זוהה — מחפש מוצר…</div>
  </div>
</div>
<div id="err-msg"></div>

<script>
// ── Streamlit bridge ──────────────────────────────────────────────────────
(function(){
  var _ls={};
  window.Streamlit={
    RENDER_EVENT:"streamlit:render",
    events:{addEventListener:function(ev,fn){_ls[ev]=_ls[ev]||[];_ls[ev].push(fn);}},
    setComponentReady:function(){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:componentReady",apiVersion:1},"*");},
    setFrameHeight:function(h){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:setFrameHeight",height:h},"*");},
    setComponentValue:function(v){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:setComponentValue",value:v,dataType:"json"},"*");}
  };
  window.addEventListener("message",function(e){if(!e.data||!e.data.type)return;(_ls[e.data.type]||[]).forEach(function(f){f(e);});});
})();

Streamlit.setFrameHeight(140);
Streamlit.setComponentReady();

// ── State ─────────────────────────────────────────────────────────────────
var _active  = false;   // true = camera is open right now
var _last    = null;    // last accepted barcode (avoids duplicates)
var _stream  = null;    // MediaStream
var _timer   = null;    // setTimeout id for detection tick
var _zxing   = null;    // ZXing BrowserMultiFormatReader

// ── RENDER_EVENT ──────────────────────────────────────────────────────────
// Streamlit sends this on every rerun. Reset UI only when camera is idle.
Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function() {
  if (_active) { Streamlit.setFrameHeight(280); return; }
  _last = null;
  _show("start-screen");
  _hide("scanner-screen");
  document.getElementById("success").classList.remove("show");
  document.getElementById("err-msg").style.display = "none";
  var btn = document.getElementById("start-btn");
  btn.disabled = false; btn.style.opacity = "1";
  Streamlit.setFrameHeight(140);
});

// ── Open scanner ──────────────────────────────────────────────────────────
function openScanner() {
  if (_active) return;
  _setBtn(true);
  _hide("err-msg");

  // Two strategies depending on browser support:
  // A) BarcodeDetector (native — iOS 17.4+, Chrome Android)
  // B) ZXing decodeFromConstraints (all others)
  if ("BarcodeDetector" in window) {
    _openCamera(function(stream) {
      _stream = stream; _active = true;
      _showScanner();
      _runNative(stream);
    });
  } else {
    _loadZXing(function() {
      _active = true;
      _showScanner();
      _runZXing();
    });
  }
}

// ── Strategy A: native BarcodeDetector ───────────────────────────────────
function _runNative(stream) {
  var video = document.getElementById("video");
  video.srcObject = stream;
  video.play();

  var detector, cand = null, hits = 0;
  try {
    detector = new BarcodeDetector({
      formats: ["ean_13","ean_8","code_128","upc_a","upc_e","code_39"]
    });
  } catch(e) {
    // BarcodeDetector constructor failed → fall through to ZXing
    _stopCamera();
    _loadZXing(function() { _active = true; _runZXing(); });
    return;
  }

  function tick() {
    if (!_active) return;
    if (video.readyState < 2) { _timer = setTimeout(tick, 100); return; }
    detector.detect(video).then(function(codes) {
      if (!codes.length) { _timer = setTimeout(tick, 80); return; }
      // Prefer longer barcodes (EAN-13 beats EAN-8)
      codes.sort(function(a,b){ return b.rawValue.length - a.rawValue.length; });
      var bc = codes[0].rawValue;
      if (bc === cand) { if (++hits >= 2) { _accept(bc); return; } }
      else             { cand = bc; hits = 1; }
      _timer = setTimeout(tick, 80);
    }).catch(function(){ _timer = setTimeout(tick, 200); });
  }
  _timer = setTimeout(tick, 400);
}

// ── Strategy B: ZXing decodeFromConstraints ───────────────────────────────
function _runZXing() {
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.UPC_A,
    ZXing.BarcodeFormat.UPC_E, ZXing.BarcodeFormat.CODE_39,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
  _zxing = new ZXing.BrowserMultiFormatReader(hints, 300);

  _zxing.decodeFromConstraints(
    { video: { facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720} } },
    document.getElementById("video"),
    function(result) {
      if (!_active || !result) return;
      var bc = result.getText();
      if (bc && bc !== _last) _accept(bc);
    }
  ).catch(function(e) {
    _active = false;
    _setBtn(false);
    _show("start-screen"); _hide("scanner-screen");
    Streamlit.setFrameHeight(170);
    _showErr((e && e.name === "NotAllowedError")
      ? "❌ אין הרשאת מצלמה — אשר גישה בהגדרות הדפדפן"
      : "❌ " + (e && e.message ? e.message : String(e)));
  });
}

// ── Accept detected barcode ───────────────────────────────────────────────
function _accept(bc) {
  if (!bc || bc === _last) return;
  _last = bc;
  _stop();
  document.getElementById("ok-val").textContent = bc;
  document.getElementById("success").classList.add("show");
  document.getElementById("scan-line").style.display = "none";
  Streamlit.setComponentValue(bc);
}

// ── Helpers ───────────────────────────────────────────────────────────────
function _openCamera(cb) {
  navigator.mediaDevices.getUserMedia({
    video: { facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720} }
  }).then(cb).catch(function(e) {
    _setBtn(false);
    _showErr((e && e.name === "NotAllowedError")
      ? "❌ אין הרשאת מצלמה — אשר גישה בהגדרות הדפדפן"
      : "❌ " + (e && e.message ? e.name : "שגיאת מצלמה"));
  });
}

function _loadZXing(cb) {
  if (typeof ZXing !== "undefined") { cb(); return; }
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js";
  s.onload  = cb;
  s.onerror = function() { _setBtn(false); _showErr("❌ שגיאת טעינה — בדוק חיבור אינטרנט"); };
  document.head.appendChild(s);
}

function _stop() {
  _active = false;
  if (_timer) { clearTimeout(_timer); _timer = null; }
  if (_zxing)  { try { _zxing.reset(); } catch(e){} _zxing = null; }
  _stopCamera();
}
function _stopCamera() {
  if (_stream) { _stream.getTracks().forEach(function(t){ t.stop(); }); _stream = null; }
  var v = document.getElementById("video"); if (v) v.srcObject = null;
}
function _showScanner() {
  _hide("start-screen"); _show("scanner-screen");
  Streamlit.setFrameHeight(280);
}
function _show(id){ document.getElementById(id).style.display = (id==="start-screen")?"flex":"block"; }
function _hide(id){ document.getElementById(id).style.display = "none"; }
function _setBtn(disabled) {
  var b = document.getElementById("start-btn");
  b.disabled = disabled; b.style.opacity = disabled ? "0.6" : "1";
}
function _showErr(msg) {
  var el = document.getElementById("err-msg"); el.textContent = msg; el.style.display = "block";
}
</script>
</body>
</html>
