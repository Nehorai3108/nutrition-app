<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#0d0f14; font-family:sans-serif; overflow:hidden; }

#start-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; padding:24px 16px; min-height:130px;
}
#start-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; max-width:320px; padding:20px;
  background:linear-gradient(135deg,#2563eb,#4f8ef7);
  border:none; border-radius:16px; cursor:pointer;
  color:#fff; font-size:1.1rem; font-weight:700;
  box-shadow:0 6px 24px rgba(79,142,247,0.4);
  -webkit-tap-highlight-color:transparent;
}
#start-btn:active { opacity:.8; }
#start-hint { color:#8892a4; font-size:12px; direction:rtl; text-align:center; }

#scanner-screen { display:none; position:relative; width:100%; }
#video { width:100%; height:260px; object-fit:cover; display:block; background:#111; }
#overlay { position:absolute; top:0; left:0; right:0; height:260px; pointer-events:none; }
.corner { position:absolute; width:24px; height:24px; border-color:#4f8ef7; border-style:solid; }
.tl{top:14px;left:14px;border-width:3px 0 0 3px;border-radius:5px 0 0 0;}
.tr{top:14px;right:14px;border-width:3px 3px 0 0;border-radius:0 5px 0 0;}
.bl{bottom:14px;left:14px;border-width:0 0 3px 3px;border-radius:0 0 0 5px;}
.br{bottom:14px;right:14px;border-width:0 3px 3px 0;border-radius:0 0 5px 0;}
#scan-line {
  position:absolute; left:12%; width:76%; height:2px;
  background:linear-gradient(90deg,transparent,#4f8ef7,transparent);
  animation:sweep 2s ease-in-out infinite;
}
@keyframes sweep{0%,100%{top:16%}50%{top:80%}}
#scan-hint {
  position:absolute; bottom:8px; left:0; right:0;
  text-align:center; color:rgba(255,255,255,.8); font-size:12px; direction:rtl;
}
#success {
  display:none; position:absolute; top:0; left:0; right:0; height:260px;
  background:rgba(20,50,35,.95);
  flex-direction:column; align-items:center; justify-content:center; gap:8px;
}
#success.show { display:flex; }
#ok-icon { font-size:2.5rem; }
#ok-val  { font-size:1.1rem; font-weight:700; color:#68d391; direction:ltr; }
#ok-lbl  { font-size:.75rem; color:#a0aec0; direction:rtl; }
#err-msg {
  padding:10px 14px; color:#fc8181; font-size:13px;
  direction:rtl; text-align:center; display:none;
  background:#2d1b1b; border-radius:8px; margin:8px;
}
</style>
</head>
<body>

<div id="start-screen">
  <button id="start-btn" onclick="openScanner()">
    <span style="font-size:1.4rem">📷</span> פתח מצלמה לסריקה
  </button>
  <div id="start-hint">לחץ פעם אחת — הסריקה תהיה אוטומטית</div>
</div>

<div id="scanner-screen">
  <video id="video" autoplay muted playsinline></video>
  <div id="overlay">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scan-line"></div>
    <div id="scan-hint">כוון את הברקוד אל המסגרת</div>
  </div>
  <div id="success">
    <div id="ok-icon">✅</div>
    <div id="ok-val"></div>
    <div id="ok-lbl">ברקוד זוהה — מחפש מוצר…</div>
  </div>
</div>
<div id="err-msg"></div>

<script>
// ── Streamlit bridge ──────────────────────────────────────────────────────
(function(){
  var _ls={};
  window.Streamlit={
    RENDER_EVENT:"streamlit:render",
    events:{addEventListener:function(ev,fn){_ls[ev]=_ls[ev]||[];_ls[ev].push(fn);}},
    setComponentReady:function(){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:componentReady",apiVersion:1},"*");},
    setFrameHeight:function(h){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:setFrameHeight",height:h},"*");},
    setComponentValue:function(v){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:setComponentValue",value:v,dataType:"json"},"*");}
  };
  window.addEventListener("message",function(e){if(!e.data||!e.data.type)return;(_ls[e.data.type]||[]).forEach(function(f){f(e);});});
})();

Streamlit.setFrameHeight(140);
Streamlit.setComponentReady();

// ── State ─────────────────────────────────────────────────────────────────
var _scannerActive = false;   // true while camera is open
var _lastScan      = null;
var _stream        = null;
var _tickTimer     = null;

// ── RENDER_EVENT: reset only when scanner is NOT active ───────────────────
// This prevents Streamlit rerenders from killing an active scan session.
Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function() {
  if (_scannerActive) {
    // Keep scanner alive, just report current height
    Streamlit.setFrameHeight(280);
    return;
  }
  // Safe to reset: bring back the start button
  _lastScan = null;
  document.getElementById("start-screen").style.display  = "flex";
  document.getElementById("scanner-screen").style.display = "none";
  document.getElementById("success").classList.remove("show");
  document.getElementById("start-btn").disabled      = false;
  document.getElementById("start-btn").style.opacity = "1";
  Streamlit.setFrameHeight(140);
});

// ── Open scanner ──────────────────────────────────────────────────────────
function openScanner() {
  if (_scannerActive) return;

  document.getElementById("start-btn").disabled      = true;
  document.getElementById("start-btn").style.opacity = "0.6";
  document.getElementById("err-msg").style.display   = "none";

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    return showErr("❌ הדפדפן לא תומך בגישה למצלמה");
  }

  navigator.mediaDevices.getUserMedia({
    video: { facingMode:{ideal:"environment"}, width:{ideal:1280}, height:{ideal:720} }
  })
  .then(function(stream) {
    _stream        = stream;
    _scannerActive = true;

    document.getElementById("start-screen").style.display   = "none";
    document.getElementById("scanner-screen").style.display = "block";
    Streamlit.setFrameHeight(280);

    var video = document.getElementById("video");
    video.srcObject = stream;
    video.play();

    video.addEventListener("loadeddata", function() {
      if ("BarcodeDetector" in window) {
        startNative(video);
      } else {
        loadZXing(video);
      }
    }, { once:true });
  })
  .catch(function(e) {
    document.getElementById("start-btn").disabled      = false;
    document.getElementById("start-btn").style.opacity = "1";
    var msg = (e.name === "NotAllowedError" || e.name === "PermissionDeniedError")
      ? "❌ אין הרשאת מצלמה — אשר גישה בהגדרות הדפדפן"
      : "❌ " + (e.message || e.name || "שגיאת מצלמה");
    showErr(msg);
  });
}

// ── Strategy A: native BarcodeDetector (Chrome Android, iOS 17+) ──────────
function startNative(video) {
  var detector;
  try {
    detector = new BarcodeDetector({
      formats: ["ean_13","ean_8","code_128","upc_a","upc_e","code_39"]
    });
  } catch(e) {
    loadZXing(video);
    return;
  }

  function tick() {
    if (!_scannerActive) return;
    detector.detect(video)
      .then(function(codes) {
        if (codes.length > 0) {
          onDetected(codes[0].rawValue);
        } else {
          _tickTimer = setTimeout(tick, 80);
        }
      })
      .catch(function() { _tickTimer = setTimeout(tick, 200); });
  }
  _tickTimer = setTimeout(tick, 300);
}

// ── Strategy B: ZXing (fallback) ──────────────────────────────────────────
function loadZXing(video) {
  if (typeof ZXing !== "undefined") { startZXing(video); return; }
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.19.2/umd/index.min.js";
  s.onload  = function() { startZXing(video); };
  s.onerror = function() { showErr("❌ שגיאת טעינת ZXing"); stopScan(); };
  document.head.appendChild(s);
}

function startZXing(video) {
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  var canvas = document.createElement("canvas");
  var ctx    = canvas.getContext("2d");

  function tick() {
    if (!_scannerActive) return;
    if (video.readyState < 2) { _tickTimer = setTimeout(tick, 100); return; }

    canvas.width  = video.videoWidth  || 640;
    canvas.height = video.videoHeight || 480;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

    try {
      var lum    = new ZXing.HTMLCanvasElementLuminanceSource(canvas);
      var bitmap = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(lum));
      var reader = new ZXing.MultiFormatReader();
      reader.setHints(hints);
      var result = reader.decode(bitmap);
      if (result) { onDetected(result.getText()); return; }
    } catch(e) {
      // NotFoundException every frame without barcode — normal
    }
    _tickTimer = setTimeout(tick, 150);
  }
  _tickTimer = setTimeout(tick, 300);
}

// ── Detected ──────────────────────────────────────────────────────────────
function onDetected(bc) {
  if (!bc || bc === _lastScan) return;
  _lastScan = bc;
  stopScan();
  document.getElementById("ok-val").textContent = bc;
  document.getElementById("success").classList.add("show");
  Streamlit.setComponentValue(bc);
}

// ── Cleanup ───────────────────────────────────────────────────────────────
function stopScan() {
  _scannerActive = false;
  if (_tickTimer) { clearTimeout(_tickTimer); _tickTimer = null; }
  if (_stream) {
    _stream.getTracks().forEach(function(t){ t.stop(); });
    _stream = null;
  }
  var video = document.getElementById("video");
  if (video) video.srcObject = null;
}

function showErr(msg) {
  var el = document.getElementById("err-msg");
  el.textContent = msg;
  el.style.display = "block";
}
</script>
</body>
</html>
