<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#0d0f14; font-family:sans-serif; overflow:hidden; }

#wrap {
  position: relative;
  width: 100%;
  height: 290px;
  background: #111;
  border-radius: 14px;
  overflow: hidden;
}

#video {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* scan frame corners */
#frame {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 68%; height: 50%;
  pointer-events: none;
}
.corner {
  position: absolute;
  width: 22px; height: 22px;
  border-color: #4f8ef7;
  border-style: solid;
}
.corner.tl { top:0; left:0;  border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
.corner.tr { top:0; right:0; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }
.corner.bl { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 6px; }
.corner.br { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }

/* scan line */
#line {
  position: absolute;
  left: 16%; width: 68%; height: 2px;
  background: linear-gradient(90deg, transparent, #4f8ef7, transparent);
  animation: sweep 2s ease-in-out infinite;
}
@keyframes sweep {
  0%   { top: 25%; }
  50%  { top: 75%; }
  100% { top: 25%; }
}

#hint {
  position: absolute;
  bottom: 10px; left: 0; right: 0;
  text-align: center;
  color: rgba(255,255,255,0.65);
  font-size: 12px;
  direction: rtl;
}

/* loading overlay */
#loading {
  position: absolute; inset: 0;
  background: #111;
  display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 8px;
  color: rgba(255,255,255,0.6); font-size:13px; direction:rtl;
}
.spinner {
  width:28px; height:28px;
  border:3px solid rgba(79,142,247,0.2);
  border-top-color:#4f8ef7;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* success overlay */
#ok {
  display: none;
  position: absolute; inset: 0;
  background: rgba(20,50,35,0.96);
  border-radius: 14px;
  flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
}
#ok.show { display:flex; }
#ok-icon { font-size:2.8rem; }
#ok-val  { font-size:1.2rem; font-weight:700; color:#68d391; direction:ltr; }
#ok-lbl  { font-size:0.78rem; color:#a0aec0; direction:rtl; }

/* error */
#err {
  padding:10px 14px; text-align:center;
  color:#fc8181; font-size:12px; direction:rtl;
  display:none;
}
</style>
</head>
<body>

<div id="wrap">
  <div id="loading">
    <div class="spinner"></div>
    <span>מפעיל מצלמה…</span>
  </div>
  <video id="video" autoplay muted playsinline></video>
  <div id="frame">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
  </div>
  <div id="line"></div>
  <div id="hint">כוון את הברקוד אל המסגרת</div>
  <div id="ok">
    <div id="ok-icon">✅</div>
    <div id="ok-val"></div>
    <div id="ok-lbl">ברקוד זוהה — מחפש מוצר…</div>
  </div>
</div>
<div id="err"></div>

<!-- Streamlit component lib — MUST load for setComponentValue to work -->
<script src="https://unpkg.com/streamlit-component-lib/dist/index.js"></script>

<script>
var _cameraStarted = false;

// ── Camera + ZXing ──────────────────────────────────────────────────────────
function startCamera() {
  if (_cameraStarted) return;
  _cameraStarted = true;

  Streamlit.setFrameHeight(310);

  var constraints = {
    video: {
      facingMode: { ideal: "environment" },
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    }
  };

  navigator.mediaDevices.getUserMedia(constraints)
    .then(function(stream) {
      document.getElementById("loading").style.display = "none";
      var video = document.getElementById("video");
      video.srcObject = stream;
      video.play();
      loadZXing(video);
    })
    .catch(function(err) {
      document.getElementById("loading").style.display = "none";
      var el = document.getElementById("err");
      el.style.display = "block";
      el.textContent = (err.name === "NotAllowedError")
        ? "❌ אין הרשאת מצלמה — אשר גישה בדפדפן ורענן"
        : "❌ שגיאת מצלמה: " + err.message;
      Streamlit.setFrameHeight(340);
    });
}

function loadZXing(video) {
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js";
  s.onload = function() { startScanning(video); };
  s.onerror = function() {
    document.getElementById("err").style.display = "block";
    document.getElementById("err").textContent = "❌ שגיאת טעינת ספריית סריקה";
  };
  document.head.appendChild(s);
}

function startScanning(video) {
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.UPC_A,
    ZXing.BarcodeFormat.UPC_E,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  var reader   = new ZXing.BrowserMultiFormatReader(hints);
  var lastScan = null;

  (function tick() {
    reader.decodeFromVideoElement(video)
      .then(function(result) {
        var bc = result.getText();
        if (bc && bc !== lastScan) {
          lastScan = bc;
          showSuccess(bc);
          Streamlit.setComponentValue(bc);   // → triggers Python rerun automatically
        }
      })
      .catch(function() {})
      .finally(function() { setTimeout(tick, 350); });
  })();
}

function showSuccess(bc) {
  document.getElementById("ok-val").textContent = bc;
  document.getElementById("ok").classList.add("show");
  document.getElementById("line").style.display = "none";
  document.getElementById("hint").style.display = "none";
}

// ── Init: wait for Streamlit render event ───────────────────────────────────
function onRender(event) {
  startCamera();
}

Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, onRender);
Streamlit.setComponentReady();
</script>
</body>
</html>
