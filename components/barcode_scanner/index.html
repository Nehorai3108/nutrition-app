<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#0d0f14; font-family:sans-serif; overflow:hidden; }

/* ── Start screen ── */
#start-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:16px; padding:24px 20px;
}

#start-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; max-width:320px; padding:20px;
  background:linear-gradient(135deg,#2563eb,#4f8ef7);
  border:none; border-radius:16px; cursor:pointer;
  color:#fff; font-size:1.1rem; font-weight:700;
  box-shadow:0 6px 24px rgba(79,142,247,0.4);
  -webkit-tap-highlight-color:transparent;
}
#start-btn:active { opacity:.8; }
#start-hint { color:#8892a4; font-size:12px; direction:rtl; text-align:center; }

/* ── Scanner screen ── */
#scanner-screen { display:none; position:relative; width:100%; }

#video {
  width:100%; height:270px;
  object-fit:cover; display:block;
  background:#000;
  /* CRITICAL for iOS: must be inline, not absolute */
}

/* corners overlay */
#overlay {
  position:absolute; top:0; left:0; right:0; height:270px;
  pointer-events:none;
}
.corner {
  position:absolute; width:24px; height:24px;
  border-color:#4f8ef7; border-style:solid;
}
.tl{top:16px;left:16px;border-width:3px 0 0 3px;border-radius:5px 0 0 0;}
.tr{top:16px;right:16px;border-width:3px 3px 0 0;border-radius:0 5px 0 0;}
.bl{bottom:16px;left:16px;border-width:0 0 3px 3px;border-radius:0 0 0 5px;}
.br{bottom:16px;right:16px;border-width:0 3px 3px 0;border-radius:0 0 5px 0;}

#scan-line {
  position:absolute; left:12%; width:76%; height:2px;
  background:linear-gradient(90deg,transparent,#4f8ef7,transparent);
  animation:sweep 2s ease-in-out infinite;
}
@keyframes sweep{0%,100%{top:18%}50%{top:78%}}

#scan-hint {
  position:absolute; bottom:10px; left:0; right:0;
  text-align:center; color:rgba(255,255,255,.7); font-size:12px; direction:rtl;
}

/* success overlay */
#success {
  display:none; position:absolute; top:0; left:0; right:0; height:270px;
  background:rgba(20,50,35,.95);
  flex-direction:column; align-items:center; justify-content:center; gap:8px;
}
#success.show{display:flex;}
#ok-icon{font-size:2.8rem;}
#ok-val{font-size:1.15rem;font-weight:700;color:#68d391;direction:ltr;}
#ok-lbl{font-size:.78rem;color:#a0aec0;direction:rtl;}

#err-msg {
  padding:10px 14px; color:#fc8181; font-size:12px;
  direction:rtl; text-align:center; display:none;
}
</style>
</head>
<body>

<!-- Step 1: tap once to open camera -->
<div id="start-screen">
  <button id="start-btn" onclick="openCamera()">
    <span style="font-size:1.5rem">📷</span>
    פתח מצלמה לסריקה
  </button>
  <div id="start-hint">לחץ פעם אחת — הסריקה תהיה אוטומטית</div>
</div>

<!-- Step 2: live scanner -->
<div id="scanner-screen">
  <video id="video" autoplay muted playsinline></video>
  <div id="overlay">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scan-line"></div>
    <div id="scan-hint">כוון את הברקוד אל המסגרת</div>
  </div>
  <div id="success">
    <div id="ok-icon">✅</div>
    <div id="ok-val"></div>
    <div id="ok-lbl">ברקוד זוהה — מחפש מוצר…</div>
  </div>
</div>
<div id="err-msg"></div>

<script src="https://unpkg.com/streamlit-component-lib/dist/index.js"></script>
<script>
var _lastScan = null;
var _zxingReady = false;

// ── Streamlit init ────────────────────────────────────────────────────────
window.addEventListener("load", function() {
  try { Streamlit.setFrameHeight(130); Streamlit.setComponentReady(); } catch(e){}
});

// ── Open camera (called on button tap — satisfies iOS gesture requirement) ─
function openCamera() {
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("scanner-screen").style.display = "block";
  try { Streamlit.setFrameHeight(290); } catch(e){}

  var video = document.getElementById("video");

  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { exact: "environment" },   // rear camera — hard requirement
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    }
  })
  .catch(function() {
    // "exact" failed — try ideal (some desktops have no rear cam)
    return navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" }, width:{ideal:1280}, height:{ideal:720} }
    });
  })
  .then(function(stream) {
    video.srcObject = stream;
    // iOS needs explicit play() inside a user-gesture chain
    var p = video.play();
    if (p && p.catch) p.catch(function(){});
    loadZXing(video);
  })
  .catch(function(err) {
    document.getElementById("scanner-screen").style.display = "none";
    document.getElementById("start-screen").style.display = "flex";
    var e = document.getElementById("err-msg");
    e.style.display = "block";
    e.textContent = err.name === "NotAllowedError"
      ? "❌ אין הרשאת מצלמה — אשר גישה בהגדרות הדפדפן"
      : "❌ שגיאת מצלמה: " + err.message;
    try { Streamlit.setFrameHeight(180); } catch(ex){}
  });
}

// ── Load ZXing then start continuous scan ────────────────────────────────
function loadZXing(video) {
  if (typeof ZXing !== "undefined") { startScan(video); return; }
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js";
  s.onload  = function() { startScan(video); };
  s.onerror = function() { showErr("שגיאת טעינת ספריית סריקה"); };
  document.head.appendChild(s);
}

function startScan(video) {
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.UPC_A,
    ZXing.BarcodeFormat.UPC_E,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  var reader = new ZXing.BrowserMultiFormatReader(hints);

  (function tick() {
    // Only scan when video is actually playing frames
    if (video.readyState >= 2) {
      reader.decodeFromVideoElement(video)
        .then(function(result) {
          var bc = result.getText();
          if (bc && bc !== _lastScan) {
            _lastScan = bc;
            showSuccess(bc);
            try { Streamlit.setComponentValue(bc); } catch(e){}
          }
          setTimeout(tick, 400);
        })
        .catch(function() { setTimeout(tick, 400); });
    } else {
      setTimeout(tick, 300); // wait for video to be ready
    }
  })();
}

function showSuccess(bc) {
  document.getElementById("ok-val").textContent = bc;
  document.getElementById("success").classList.add("show");
  document.getElementById("scan-line").style.display = "none";
  document.getElementById("scan-hint").style.display = "none";
}

function showErr(msg) {
  var e = document.getElementById("err-msg");
  e.textContent = "❌ " + msg;
  e.style.display = "block";
}
</script>
</body>
</html>
