<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#0d0f14; font-family:sans-serif; overflow:hidden; }

#start-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; padding:24px 16px; min-height:130px;
}
#start-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; max-width:320px; padding:20px;
  background:linear-gradient(135deg,#2563eb,#4f8ef7);
  border:none; border-radius:16px; cursor:pointer;
  color:#fff; font-size:1.1rem; font-weight:700;
  box-shadow:0 6px 24px rgba(79,142,247,0.4);
  -webkit-tap-highlight-color:transparent;
}
#start-btn:active { opacity:.8; }
#start-hint { color:#8892a4; font-size:12px; direction:rtl; text-align:center; }

#scanner-screen { display:none; position:relative; width:100%; }
#video {
  width:100%; height:260px;
  object-fit:cover; display:block; background:#111;
}
#overlay {
  position:absolute; top:0; left:0; right:0; height:260px;
  pointer-events:none;
}
.corner { position:absolute; width:24px; height:24px; border-color:#4f8ef7; border-style:solid; }
.tl{top:14px;left:14px;border-width:3px 0 0 3px;border-radius:5px 0 0 0;}
.tr{top:14px;right:14px;border-width:3px 3px 0 0;border-radius:0 5px 0 0;}
.bl{bottom:14px;left:14px;border-width:0 0 3px 3px;border-radius:0 0 0 5px;}
.br{bottom:14px;right:14px;border-width:0 3px 3px 0;border-radius:0 0 5px 0;}
#scan-line {
  position:absolute; left:12%; width:76%; height:2px;
  background:linear-gradient(90deg,transparent,#4f8ef7,transparent);
  animation:sweep 2s ease-in-out infinite;
}
@keyframes sweep{0%,100%{top:16%}50%{top:80%}}
#scan-hint {
  position:absolute; bottom:8px; left:0; right:0;
  text-align:center; color:rgba(255,255,255,.8); font-size:12px; direction:rtl;
}
#success {
  display:none; position:absolute; top:0; left:0; right:0; height:260px;
  background:rgba(20,50,35,.95);
  flex-direction:column; align-items:center; justify-content:center; gap:8px;
}
#success.show{display:flex;}
#ok-icon{font-size:2.5rem;}
#ok-val{font-size:1.1rem;font-weight:700;color:#68d391;direction:ltr;}
#ok-lbl{font-size:.75rem;color:#a0aec0;direction:rtl;}
#err-msg{padding:8px 14px;color:#fc8181;font-size:12px;direction:rtl;text-align:center;display:none;}
</style>
</head>
<body>

<div id="start-screen">
  <button id="start-btn" onclick="openScanner()">
    <span style="font-size:1.4rem">📷</span> פתח מצלמה לסריקה
  </button>
  <div id="start-hint">לחץ פעם אחת — הסריקה תהיה אוטומטית</div>
</div>

<div id="scanner-screen">
  <video id="video" autoplay muted playsinline></video>
  <div id="overlay">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scan-line"></div>
    <div id="scan-hint">כוון את הברקוד אל המסגרת</div>
  </div>
  <div id="success">
    <div id="ok-icon">✅</div>
    <div id="ok-val"></div>
    <div id="ok-lbl">ברקוד זוהה — מחפש מוצר…</div>
  </div>
</div>
<div id="err-msg"></div>

<script>
// ── Inline Streamlit bridge ────────────────────────────────────────────────
(function() {
  var _ls = {};
  window.Streamlit = {
    RENDER_EVENT: "streamlit:render",
    events: {
      addEventListener: function(ev, fn) {
        _ls[ev] = _ls[ev] || []; _ls[ev].push(fn);
      }
    },
    setComponentReady: function() {
      window.parent.postMessage({ isStreamlitMessage:true, type:"streamlit:componentReady", apiVersion:1 }, "*");
    },
    setFrameHeight: function(h) {
      window.parent.postMessage({ isStreamlitMessage:true, type:"streamlit:setFrameHeight", height:h }, "*");
    },
    setComponentValue: function(v) {
      window.parent.postMessage({ isStreamlitMessage:true, type:"streamlit:setComponentValue", value:v, dataType:"json" }, "*");
    }
  };
  window.addEventListener("message", function(e) {
    if (!e.data || !e.data.type) return;
    (_ls[e.data.type] || []).forEach(function(f){ f(e); });
  });
})();

Streamlit.setFrameHeight(140);
Streamlit.setComponentReady();
Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function() {
  Streamlit.setFrameHeight(140);
});

// ── State ─────────────────────────────────────────────────────────────────
var _lastScan  = null;
var _scanning  = false;
var _stream    = null;
var _codeReader = null;

// ── Entry point ───────────────────────────────────────────────────────────
function openScanner() {
  document.getElementById("start-screen").style.display = "none";
  document.getElementById("scanner-screen").style.display = "block";
  Streamlit.setFrameHeight(280);

  if ("BarcodeDetector" in window) {
    openCameraAndDetectNative();
  } else {
    loadZXingAndScan();
  }
}

// ── Strategy A: Native BarcodeDetector API ────────────────────────────────
// Works in Chrome Android (83+), Samsung Internet, Safari iOS 17.4+
// Reads directly from the video element — no canvas, no security issues
function openCameraAndDetectNative() {
  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: "environment" },
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    }
  }).then(function(stream) {
    _stream  = stream;
    _scanning = true;
    var video = document.getElementById("video");
    video.srcObject = stream;
    video.play();

    // Wait for first frame before scanning
    video.addEventListener("loadeddata", function() {
      var detector;
      try {
        detector = new BarcodeDetector({
          formats: ["ean_13", "ean_8", "code_128", "upc_a", "upc_e", "code_39", "qr_code"]
        });
      } catch(e) {
        // BarcodeDetector constructor failed — fall back to ZXing
        stopCamera();
        loadZXingAndScan();
        return;
      }

      function tick() {
        if (!_scanning) return;
        detector.detect(video).then(function(barcodes) {
          if (barcodes.length > 0) {
            var bc = barcodes[0].rawValue;
            if (bc && bc !== _lastScan) {
              _lastScan = bc;
              _scanning  = false;
              stopCamera();
              showSuccess(bc);
              Streamlit.setComponentValue(bc);
            } else {
              setTimeout(tick, 80);
            }
          } else {
            setTimeout(tick, 80);
          }
        }).catch(function() {
          setTimeout(tick, 200);
        });
      }

      setTimeout(tick, 200); // short stabilization delay
    }, { once: true });

  }).catch(function(e) {
    showErr(e.name === "NotAllowedError"
      ? "❌ אין הרשאת מצלמה — אשר גישה בהגדרות"
      : "❌ " + e.message);
    resetToStart();
  });
}

// ── Strategy B: ZXing (fallback for older browsers) ───────────────────────
function loadZXingAndScan() {
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js";
  s.onload  = startZXing;
  s.onerror = function() { showErr("שגיאת טעינת ZXing"); };
  document.head.appendChild(s);
}

function startZXing() {
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13,
    ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128,
    ZXing.BarcodeFormat.UPC_A,
    ZXing.BarcodeFormat.UPC_E,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  _codeReader = new ZXing.BrowserMultiFormatReader(hints, 300);

  _codeReader.decodeFromConstraints(
    {
      video: {
        facingMode: { ideal: "environment" },
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      }
    },
    document.getElementById("video"),
    function(result, err) {
      if (result) {
        var bc = result.getText();
        if (bc && bc !== _lastScan) {
          _lastScan = bc;
          if (_codeReader) { _codeReader.reset(); _codeReader = null; }
          showSuccess(bc);
          Streamlit.setComponentValue(bc);
        }
      }
      // NotFoundException fires on most frames — normal, ignore
    }
  ).catch(function(e) {
    showErr(e.name === "NotAllowedError"
      ? "❌ אין הרשאת מצלמה — אשר גישה בהגדרות"
      : "❌ " + e.message);
    resetToStart();
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────
function stopCamera() {
  if (_stream) {
    _stream.getTracks().forEach(function(t) { t.stop(); });
    _stream = null;
  }
}

function resetToStart() {
  stopCamera();
  document.getElementById("scanner-screen").style.display = "none";
  document.getElementById("start-screen").style.display  = "flex";
  Streamlit.setFrameHeight(170);
}

function showSuccess(bc) {
  document.getElementById("ok-val").textContent = bc;
  document.getElementById("success").classList.add("show");
  document.getElementById("scan-line").style.display = "none";
  document.getElementById("scan-hint").style.display = "none";
}

function showErr(msg) {
  var e = document.getElementById("err-msg");
  e.textContent = msg; e.style.display = "block";
}
</script>
</body>
</html>
