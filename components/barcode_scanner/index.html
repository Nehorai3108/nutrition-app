<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html,body { width:100%; background:#0d0f14; font-family:sans-serif; overflow:hidden; }

/* ── Scan button screen ─────────────────────────────── */
#scan-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:12px; padding:20px 16px; min-height:150px;
}
#scan-btn {
  width:100%; max-width:300px; padding:18px 24px;
  background:linear-gradient(135deg,#2563eb,#4f8ef7);
  border:none; border-radius:16px; cursor:pointer;
  color:#fff; font-size:1.1rem; font-weight:700;
  box-shadow:0 6px 24px rgba(79,142,247,.4);
  display:flex; align-items:center; justify-content:center; gap:10px;
  -webkit-tap-highlight-color:transparent;
}
#scan-btn:active { opacity:.8; }
#hint  { color:#8892a4; font-size:12px; direction:rtl; text-align:center; }
#msg   { font-size:13px; direction:rtl; text-align:center;
         min-height:18px; padding:0 12px; }
.ok    { color:#68d391; font-weight:700; }
.fail  { color:#fc8181; }
#live-link {
  font-size:11px; color:#4f8ef7; cursor:pointer;
  text-decoration:underline; direction:rtl;
}

/* ── Success screen ─────────────────────────────────── */
#ok-screen {
  display:none; flex-direction:column; align-items:center;
  justify-content:center; gap:8px; padding:20px; min-height:150px;
}
#bc-val { font-size:1.4rem; font-weight:800; color:#68d391; direction:ltr; }
#rescan-btn {
  margin-top:4px; padding:10px 28px;
  background:#1e3a5f; border:1px solid #2b6cb0; border-radius:10px;
  cursor:pointer; color:#63b3ed; font-size:.9rem; font-weight:600;
}

/* ── Live camera screen ─────────────────────────────── */
#live-screen { display:none; position:relative; width:100%; }
#video  { width:100%; height:220px; object-fit:cover; display:block; background:#111; }
#frame  { position:absolute; top:0; left:0; right:0; height:220px; pointer-events:none; }
.corner { position:absolute; width:24px; height:24px;
          border-color:#4f8ef7; border-style:solid; }
.tl{top:12px;left:12px;border-width:3px 0 0 3px;border-radius:4px 0 0 0;}
.tr{top:12px;right:12px;border-width:3px 3px 0 0;border-radius:0 4px 0 0;}
.bl{bottom:12px;left:12px;border-width:0 0 3px 3px;border-radius:0 0 0 4px;}
.br{bottom:12px;right:12px;border-width:0 3px 3px 0;border-radius:0 0 4px 0;}
#sweep {
  position:absolute; left:10%; width:80%; height:2px;
  background:linear-gradient(90deg,transparent,#4f8ef7,transparent);
  animation:sw 2s ease-in-out infinite;
}
@keyframes sw{0%,100%{top:14%}50%{top:78%}}
#live-hint {
  position:absolute; bottom:6px; left:0; right:0;
  text-align:center; color:rgba(255,255,255,.75);
  font-size:12px; direction:rtl;
}
#stop-btn {
  width:100%; padding:10px; background:#2d1b1b;
  border:none; cursor:pointer; color:#fc8181;
  font-size:.9rem; border-radius:0 0 8px 8px;
}
</style>
</head>
<body>

<!-- hidden file input — works on mobile over HTTP (no getUserMedia needed) -->
<input id="fileIn" type="file" accept="image/*" capture="environment"
       style="display:none" onchange="onFile(this)">

<!-- Screen 1: Scan button -->
<div id="scan-screen">
  <button id="scan-btn" onclick="document.getElementById('fileIn').click()">
    <span style="font-size:1.4rem">📷</span> צלם תמונה (גיבוי)
  </button>
  <div id="hint">מצלמה נטענת...</div>
  <div id="msg"></div>
</div>

<!-- Screen 2: Success -->
<div id="ok-screen">
  <div style="font-size:2.2rem">✅</div>
  <div id="bc-val"></div>
  <div style="font-size:.8rem;color:#a0aec0;direction:rtl">ברקוד זוהה — מחפש מוצר…</div>
  <button id="rescan-btn" onclick="resetAll()">סרוק מוצר אחר</button>
</div>

<!-- Screen 3: Live camera -->
<div id="live-screen">
  <video id="video" autoplay muted playsinline></video>
  <div id="frame">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="sweep"></div>
    <div id="live-hint">כוון את הברקוד אל המסגרת</div>
  </div>
  <button id="stop-btn" onclick="stopLive()">✕ עצור מצלמה</button>
</div>

<script>
// ── Streamlit bridge ─────────────────────────────────────────────────────
(function(){
  var _ls={};
  window.Streamlit={
    RENDER_EVENT:"streamlit:render",
    events:{addEventListener:function(ev,fn){_ls[ev]=_ls[ev]||[];_ls[ev].push(fn);}},
    setComponentReady:function(){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:componentReady",apiVersion:1},"*");},
    setFrameHeight:function(h){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:setFrameHeight",height:h},"*");},
    setComponentValue:function(v){window.parent.postMessage({isStreamlitMessage:true,type:"streamlit:setComponentValue",value:v,dataType:"json"},"*");}
  };
  window.addEventListener("message",function(e){if(!e.data||!e.data.type)return;(_ls[e.data.type]||[]).forEach(function(f){f(e);});});
})();

Streamlit.setFrameHeight(150);
Streamlit.setComponentReady();

var _stream=null, _liveTimer=null, _zxingR=null, _zxingLoaded=false, _lastBC=null;
var _autoStarted=false;

// On Streamlit rerun: only reset UI if we're not in live mode
Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function(){
  if (!_stream) {
    show("scan-screen");
    Streamlit.setFrameHeight(150);
    // Auto-start live camera once on first render
    if (!_autoStarted) {
      _autoStarted = true;
      if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
        document.getElementById("hint").textContent = "פותח מצלמה...";
        startLive();
      } else {
        document.getElementById("hint").textContent = "לחץ לצילום ברקוד";
      }
    }
  }
});

// ─────────────────────────────────────────────────────────────────────────
// FILE INPUT PATH (works on all mobile, even HTTP)
// ─────────────────────────────────────────────────────────────────────────
function onFile(input) {
  var file = input.files && input.files[0];
  if (!file) return;
  input.value = "";            // allow re-selecting same file
  setMsg("מפענח ברקוד...", "");

  var fr = new FileReader();
  fr.onload = function(e){ decodeDataUrl(e.target.result); };
  fr.readAsDataURL(file);
}

function decodeDataUrl(dataUrl) {
  var img = new Image();
  img.onload = function() {
    if (typeof BarcodeDetector !== "undefined") {
      // Strategy 1: native BarcodeDetector (Chrome Android, iOS 17.4+) — no CDN needed
      createImageBitmap(img).then(function(bm) {
        var det;
        try {
          det = new BarcodeDetector({
            formats:["ean_13","ean_8","code_128","upc_a","upc_e","code_39","qr_code","data_matrix"]
          });
        } catch(e) { zxingFallback(img); return; }
        det.detect(bm).then(function(codes){
          if (codes && codes.length) {
            codes.sort(function(a,b){return b.rawValue.length-a.rawValue.length;});
            if (codes[0].rawValue) { accept(codes[0].rawValue); return; }
          }
          zxingFallback(img);
        }).catch(function(){ zxingFallback(img); });
      }).catch(function(){ zxingFallback(img); });
    } else {
      // Strategy 2: ZXing via CDN
      zxingFallback(img);
    }
  };
  img.onerror = function(){ setMsg("שגיאה בטעינת תמונה", "fail"); };
  img.src = dataUrl;
}

// ─────────────────────────────────────────────────────────────────────────
// ZXING FALLBACK
// ─────────────────────────────────────────────────────────────────────────
function zxingFallback(imgEl) {
  setMsg("טוען ZXing...", "");
  loadZXing(function(){
    var canvas = document.createElement("canvas");
    canvas.width = imgEl.naturalWidth; canvas.height = imgEl.naturalHeight;
    var ctx = canvas.getContext("2d");
    ctx.drawImage(imgEl, 0, 0);

    var hints = new Map();
    hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
      ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,
      ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.UPC_A,
      ZXing.BarcodeFormat.UPC_E,ZXing.BarcodeFormat.CODE_39,
      ZXing.BarcodeFormat.QR_CODE,
    ]);
    hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
    var reader = new ZXing.BrowserMultiFormatReader(hints);

    // Pass 1 — original colours
    try {
      var r1 = reader.decodeFromCanvas(canvas);
      if (r1 && r1.getText()) { accept(r1.getText()); return; }
    } catch(e1){}

    // Pass 2 — binarise (improves low-contrast / dark photos)
    try {
      var id=ctx.getImageData(0,0,canvas.width,canvas.height), d=id.data;
      for(var i=0;i<d.length;i+=4){
        var g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
        d[i]=d[i+1]=d[i+2]=(g<128?0:255);
      }
      ctx.putImageData(id,0,0);
      var r2 = reader.decodeFromCanvas(canvas);
      if (r2 && r2.getText()) { accept(r2.getText()); return; }
    } catch(e2){}

    setMsg("לא ניתן לקרוא ברקוד — נסה שוב קרוב יותר ובאור טוב", "fail");
  });
}

function loadZXing(cb) {
  if (_zxingLoaded && typeof ZXing !== "undefined") { cb(); return; }
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js";
  s.onload  = function(){ _zxingLoaded=true; cb(); };
  s.onerror = function(){ setMsg("שגיאת טעינה — בדוק חיבור", "fail"); };
  document.head.appendChild(s);
}

// ─────────────────────────────────────────────────────────────────────────
// LIVE CAMERA (bonus — needs getUserMedia / HTTPS or localhost)
// ─────────────────────────────────────────────────────────────────────────
function startLive() {
  if (typeof BarcodeDetector !== "undefined") {
    _startLiveNative();
  } else {
    loadZXing(_startLiveZXing);
  }
}

function _startLiveNative() {
  navigator.mediaDevices.getUserMedia({
    video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}
  }).then(function(stream){
    _stream=stream;
    var v=document.getElementById("video");
    v.srcObject=stream; v.play();
    show("live-screen"); Streamlit.setFrameHeight(270);

    var det=new BarcodeDetector({formats:["ean_13","ean_8","code_128","upc_a","upc_e","code_39","qr_code"]});
    var cand=null, hits=0;
    function tick(){
      if(!_stream) return;
      if(v.readyState<2){ _liveTimer=setTimeout(tick,100); return; }
      det.detect(v).then(function(codes){
        if(!codes.length){ _liveTimer=setTimeout(tick,80); return; }
        codes.sort(function(a,b){return b.rawValue.length-a.rawValue.length;});
        var bc=codes[0].rawValue;
        if(bc===cand){ if(++hits>=2){ stopLive(); accept(bc); return; }}
        else{ cand=bc; hits=1; }
        _liveTimer=setTimeout(tick,80);
      }).catch(function(){ _liveTimer=setTimeout(tick,200); });
    }
    _liveTimer=setTimeout(tick,400);
  }).catch(function(e){
    show("scan-screen"); Streamlit.setFrameHeight(150);
    setMsg((e&&e.name==="NotAllowedError")
      ?"אין הרשאת מצלמה — לחץ לצלם תמונה":"לחץ לסרוק ברקוד","fail");
  });
}

function _startLiveZXing() {
  var hints=new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS,[
    ZXing.BarcodeFormat.EAN_13,ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128,ZXing.BarcodeFormat.UPC_A,
    ZXing.BarcodeFormat.UPC_E,ZXing.BarcodeFormat.CODE_39,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER,true);
  _zxingR=new ZXing.BrowserMultiFormatReader(hints,300);
  _zxingR.decodeFromConstraints(
    {video:{facingMode:{ideal:"environment"},width:{ideal:1280},height:{ideal:720}}},
    document.getElementById("video"),
    function(result){
      if(!_stream||!result) return;
      var bc=result.getText();
      if(bc&&bc!==_lastBC){ stopLive(); accept(bc); }
    }
  ).then(function(){
    _stream=document.getElementById("video").srcObject;
    show("live-screen"); Streamlit.setFrameHeight(270);
  }).catch(function(e){
    show("scan-screen"); Streamlit.setFrameHeight(150);
    setMsg((e&&e.name==="NotAllowedError")
      ?"אין הרשאת מצלמה — לחץ לצלם תמונה":"לחץ לסרוק ברקוד","fail");
  });
}

function stopLive(){
  if(_liveTimer){ clearTimeout(_liveTimer); _liveTimer=null; }
  if(_zxingR){ try{_zxingR.reset();}catch(e){} _zxingR=null; }
  if(_stream){ _stream.getTracks().forEach(function(t){t.stop();}); _stream=null; }
  var v=document.getElementById("video"); if(v) v.srcObject=null;
  show("scan-screen"); Streamlit.setFrameHeight(150);
}

// ─────────────────────────────────────────────────────────────────────────
// ACCEPT / RESET
// ─────────────────────────────────────────────────────────────────────────
function accept(bc) {
  if (!bc) return;
  _lastBC = bc;
  document.getElementById("bc-val").textContent = bc;
  show("ok-screen");
  Streamlit.setFrameHeight(170);
  Streamlit.setComponentValue(bc);
}

function resetAll() {
  _lastBC = null;
  setMsg("","");
  show("scan-screen");
  Streamlit.setFrameHeight(150);
  Streamlit.setComponentValue("");   // "" = reset signal (null can't be distinguished from "not yet scanned")
}

// ─────────────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────────────
function show(id) {
  ["scan-screen","ok-screen","live-screen"].forEach(function(s){
    var el=document.getElementById(s);
    if(el) el.style.display=(s===id)?"flex":"none";
  });
}
function setMsg(txt, cls){
  var el=document.getElementById("msg");
  el.textContent=txt; el.className=cls;
}
</script>
</body>
</html>
