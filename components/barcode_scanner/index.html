<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#0d0f14; font-family:sans-serif; overflow:hidden; }

#start-screen {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; gap:14px; padding:24px 16px; min-height:130px;
}
#start-btn {
  display:flex; align-items:center; justify-content:center; gap:10px;
  width:100%; max-width:320px; padding:20px;
  background:linear-gradient(135deg,#2563eb,#4f8ef7);
  border:none; border-radius:16px; cursor:pointer;
  color:#fff; font-size:1.1rem; font-weight:700;
  box-shadow:0 6px 24px rgba(79,142,247,0.4);
  -webkit-tap-highlight-color:transparent;
}
#start-btn:active { opacity:.8; }
#start-hint { color:#8892a4; font-size:12px; direction:rtl; text-align:center; }
#loading-msg { color:#8892a4; font-size:13px; direction:rtl; text-align:center; display:none; }

/* html5-qrcode overrides */
#reader {
  display:none;
  width:100%; border-radius:0; overflow:hidden;
  background:#000;
}
#reader video {
  width:100% !important;
  height:260px !important;
  object-fit:cover !important;
  display:block !important;
}
/* hide html5-qrcode chrome: header, file upload, select-camera text */
#reader__header_message,
#reader__dashboard,
#reader__filescan_input,
#reader__dashboard_section_csr,
#reader__dashboard_section_fsr,
#reader__status_span { display:none !important; }
/* scan region box */
#reader__scan_region { position:relative; }
/* make the guided overlay transparent so our overlay works */
#reader__scan_region > img { display:none !important; }

/* our overlay on top of the video */
#scan-overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none; display:none;
}
.corner { position:absolute; width:24px; height:24px; border-color:#4f8ef7; border-style:solid; }
.tl{top:14px;left:14px;border-width:3px 0 0 3px;border-radius:5px 0 0 0;}
.tr{top:14px;right:14px;border-width:3px 3px 0 0;border-radius:0 5px 0 0;}
.bl{bottom:14px;left:14px;border-width:0 0 3px 3px;border-radius:0 0 0 5px;}
.br{bottom:14px;right:14px;border-width:0 3px 3px 0;border-radius:0 0 5px 0;}
#scan-line {
  position:absolute; left:12%; width:76%; height:2px;
  background:linear-gradient(90deg,transparent,#4f8ef7,transparent);
  animation:sweep 2s ease-in-out infinite;
}
@keyframes sweep{0%,100%{top:16%}50%{top:80%}}
#scan-hint {
  position:absolute; bottom:8px; left:0; right:0;
  text-align:center; color:rgba(255,255,255,.8); font-size:12px; direction:rtl;
}

#success {
  display:none; width:100%; height:260px;
  background:rgba(20,50,35,.95);
  flex-direction:column; align-items:center; justify-content:center; gap:8px;
}
#success.show{display:flex;}
#ok-icon{font-size:2.5rem;}
#ok-val{font-size:1.1rem;font-weight:700;color:#68d391;direction:ltr;}
#ok-lbl{font-size:.75rem;color:#a0aec0;direction:rtl;}
#err-msg{padding:8px 14px;color:#fc8181;font-size:12px;direction:rtl;text-align:center;display:none;}
</style>
</head>
<body>

<div id="start-screen">
  <button id="start-btn" onclick="loadAndScan()">
    <span style="font-size:1.4rem">📷</span> פתח מצלמה לסריקה
  </button>
  <div id="start-hint">לחץ פעם אחת — הסריקה תהיה אוטומטית</div>
  <div id="loading-msg">⏳ טוען סורק…</div>
</div>

<!-- html5-qrcode target div -->
<div style="position:relative;">
  <div id="reader"></div>
  <div id="scan-overlay">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>
    <div id="scan-line"></div>
    <div id="scan-hint">כוון את הברקוד אל המסגרת</div>
  </div>
</div>

<div id="success">
  <div id="ok-icon">✅</div>
  <div id="ok-val"></div>
  <div id="ok-lbl">ברקוד זוהה — מחפש מוצר…</div>
</div>
<div id="err-msg"></div>

<script>
// ── Inline Streamlit bridge ────────────────────────────────────────────────
(function() {
  var _ls = {};
  window.Streamlit = {
    RENDER_EVENT: "streamlit:render",
    events: {
      addEventListener: function(ev, fn) {
        _ls[ev] = _ls[ev] || []; _ls[ev].push(fn);
      }
    },
    setComponentReady: function() {
      window.parent.postMessage({ isStreamlitMessage:true, type:"streamlit:componentReady", apiVersion:1 }, "*");
    },
    setFrameHeight: function(h) {
      window.parent.postMessage({ isStreamlitMessage:true, type:"streamlit:setFrameHeight", height:h }, "*");
    },
    setComponentValue: function(v) {
      window.parent.postMessage({ isStreamlitMessage:true, type:"streamlit:setComponentValue", value:v, dataType:"json" }, "*");
    }
  };
  window.addEventListener("message", function(e) {
    if (!e.data || !e.data.type) return;
    (_ls[e.data.type] || []).forEach(function(f){ f(e); });
  });
})();

Streamlit.setFrameHeight(140);
Streamlit.setComponentReady();

// On every Streamlit rerender (including after a successful scan triggers a rerun),
// reset the component back to the start screen so the user can scan again.
Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function() {
  if (_scanner) {
    try { _scanner.stop().catch(function(){}); } catch(e2) {}
    _scanner = null;
  }
  _lastScan = null;
  document.getElementById("start-screen").style.display  = "flex";
  document.getElementById("reader").style.display         = "none";
  document.getElementById("scan-overlay").style.display   = "none";
  document.getElementById("success").classList.remove("show");
  document.getElementById("err-msg").style.display        = "none";
  document.getElementById("start-btn").disabled           = false;
  document.getElementById("start-btn").style.opacity      = "1";
  document.getElementById("loading-msg").style.display    = "none";
  Streamlit.setFrameHeight(140);
});

// ── Scanner ───────────────────────────────────────────────────────────────
var _lastScan = null;
var _scanner  = null;

function loadAndScan() {
  document.getElementById("start-btn").disabled = true;
  document.getElementById("start-btn").style.opacity = "0.6";
  document.getElementById("loading-msg").style.display = "block";

  // If the library was already loaded in a previous scan, go straight to startScanner
  if (typeof Html5Qrcode !== "undefined") {
    startScanner();
    return;
  }

  var s = document.createElement("script");
  s.src = "https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js";
  s.onload  = startScanner;
  s.onerror = function() {
    showErr("❌ שגיאת טעינת הסורק");
    resetToStart();
  };
  document.head.appendChild(s);
}

function startScanner() {
  // Switch UI
  document.getElementById("start-screen").style.display = "none";
  // Clear any leftover DOM from a previous scan session
  document.getElementById("reader").innerHTML = "";
  document.getElementById("reader").style.display = "block";
  document.getElementById("scan-overlay").style.display = "block";
  Streamlit.setFrameHeight(280);

  // EAN / barcode formats
  var formats = [
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.CODE_39,
  ];

  try {
    _scanner = new Html5Qrcode("reader", {
      formatsToSupport: formats,
      verbose: false
    });
  } catch(e) {
    showErr("❌ " + (e.message || "שגיאת אתחול"));
    resetToStart();
    return;
  }

  _scanner.start(
    { facingMode: { ideal: "environment" } },
    {
      fps: 10,
      // qrbox covers most of the frame so barcodes don't need to be perfectly centered
      qrbox: function(w, h) {
        return { width: Math.round(w * 0.85), height: Math.round(h * 0.55) };
      },
      aspectRatio: 16 / 9,
      disableFlip: false
    },
    function onSuccess(text) {
      if (text && text !== _lastScan) {
        _lastScan = text;
        _scanner.stop().catch(function(){});
        showSuccess(text);
        Streamlit.setComponentValue(text);
      }
    },
    function onScanError() {
      // NotFoundException fires every frame without a barcode — normal, ignore
    }
  ).catch(function(err) {
    var msg = (typeof err === "string") ? err : (err && err.message) ? err.message : "שגיאת מצלמה";
    if (msg.indexOf("NotAllowed") !== -1 || msg.indexOf("Permission") !== -1) {
      msg = "❌ אין הרשאת מצלמה — אשר גישה בהגדרות";
    } else {
      msg = "❌ " + msg;
    }
    showErr(msg);
    resetToStart();
  });
}

function resetToStart() {
  document.getElementById("reader").style.display = "none";
  document.getElementById("scan-overlay").style.display = "none";
  document.getElementById("start-screen").style.display = "flex";
  document.getElementById("start-btn").disabled = false;
  document.getElementById("start-btn").style.opacity = "1";
  document.getElementById("loading-msg").style.display = "none";
  Streamlit.setFrameHeight(170);
}

function showSuccess(bc) {
  document.getElementById("reader").style.display = "none";
  document.getElementById("scan-overlay").style.display = "none";
  document.getElementById("ok-val").textContent = bc;
  document.getElementById("success").classList.add("show");
}

function showErr(msg) {
  var el = document.getElementById("err-msg");
  el.textContent = msg;
  el.style.display = "block";
}
</script>
</body>
</html>
