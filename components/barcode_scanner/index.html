<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body { width:100%; background:#0d0f14; font-family:sans-serif; overflow:hidden; }

#wrap {
  position: relative;
  width: 100%;
  height: 290px;
  background: #000;
  border-radius: 12px;
  overflow: hidden;
}

/* video always visible — no overlay hiding it */
#video {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 12px;
}

/* scan corners */
.corner {
  position: absolute;
  width: 24px; height: 24px;
  border-color: #4f8ef7; border-style: solid;
  z-index: 2; pointer-events:none;
}
.tl { top:20%; left:10%;  border-width:3px 0 0 3px; border-radius:5px 0 0 0; }
.tr { top:20%; right:10%; border-width:3px 3px 0 0; border-radius:0 5px 0 0; }
.bl { top:70%; left:10%;  border-width:0 0 3px 3px; border-radius:0 0 0 5px; }
.br { top:70%; right:10%; border-width:0 3px 3px 0; border-radius:0 0 5px 0; }

/* scan line */
#line {
  position: absolute;
  left: 10%; width: 80%; height: 2px;
  background: linear-gradient(90deg, transparent, #4f8ef7, transparent);
  animation: sweep 2s ease-in-out infinite;
  z-index: 2; pointer-events:none;
}
@keyframes sweep { 0%,100% { top:22%; } 50% { top:70%; } }

#hint {
  position: absolute; bottom:10px; left:0; right:0;
  text-align:center; color:rgba(255,255,255,0.7); font-size:12px;
  direction:rtl; z-index:2; pointer-events:none;
}

/* shown after barcode found */
#ok {
  display:none; position:absolute; inset:0;
  background:rgba(20,50,35,0.95);
  flex-direction:column; align-items:center; justify-content:center;
  gap:8px; z-index:3; border-radius:12px;
}
#ok.show { display:flex; }
#ok-icon { font-size:2.6rem; }
#ok-val  { font-size:1.1rem; font-weight:700; color:#68d391; direction:ltr; }
#ok-lbl  { font-size:0.78rem; color:#a0aec0; direction:rtl; }

/* status line under camera */
#status {
  padding:8px 12px; font-size:12px; direction:rtl;
  color:#8892a4; text-align:center;
}
</style>
</head>
<body>

<div id="wrap">
  <video id="video" autoplay muted playsinline></video>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>
  <div id="line"></div>
  <div id="hint">כוון את הברקוד אל המסגרת</div>
  <div id="ok">
    <div id="ok-icon">✅</div>
    <div id="ok-val"></div>
    <div id="ok-lbl">ברקוד זוהה — מחפש מוצר…</div>
  </div>
</div>
<div id="status">מפעיל מצלמה…</div>

<!-- Streamlit component lib -->
<script src="https://unpkg.com/streamlit-component-lib/dist/index.js"
        onerror="onCdnError()"></script>

<script>
var _started = false;
var _streamlitReady = false;

function onCdnError() {
  // CDN failed — load from jsDelivr as fallback
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/streamlit-component-lib/dist/index.js";
  s.onload  = function() { initStreamlit(); };
  s.onerror = function() { startCamera(); }; // start anyway even without Streamlit
  document.head.appendChild(s);
}

function initStreamlit() {
  if (_streamlitReady) return;
  _streamlitReady = true;
  try {
    Streamlit.setFrameHeight(320);
    Streamlit.events.addEventListener(Streamlit.RENDER_EVENT, function() {
      startCamera();
    });
    Streamlit.setComponentReady();
  } catch(e) {
    startCamera(); // fallback
  }
}

// Start camera regardless after 1s — handles cases where render event is slow
setTimeout(function() {
  if (!_started) startCamera();
}, 1000);

function startCamera() {
  if (_started) return;
  _started = true;
  setStatus("מחפש מצלמה…");

  navigator.mediaDevices.getUserMedia({
    video: {
      facingMode: { ideal: "environment" },
      width:  { ideal: 1280 },
      height: { ideal: 720 }
    }
  })
  .then(function(stream) {
    var v = document.getElementById("video");
    v.srcObject = stream;
    // iOS requires explicit play() call
    var playPromise = v.play();
    if (playPromise !== undefined) {
      playPromise
        .then(function() { setStatus("סורק…"); loadZXing(v); })
        .catch(function(e) { setStatus("❌ לא ניתן להפעיל וידאו: " + e.message); });
    } else {
      setStatus("סורק…");
      loadZXing(v);
    }
  })
  .catch(function(err) {
    if (err.name === "NotAllowedError") {
      setStatus("❌ אין הרשאת מצלמה — אשר גישה בדפדפן ורענן");
    } else {
      setStatus("❌ שגיאת מצלמה: " + err.message);
    }
  });
}

function loadZXing(video) {
  var s = document.createElement("script");
  s.src = "https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js";
  s.onload = function() { startScanning(video); };
  s.onerror = function() { setStatus("❌ שגיאת טעינת ZXing"); };
  document.head.appendChild(s);
}

function startScanning(video) {
  setStatus("סורק…");
  var hints = new Map();
  hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
    ZXing.BarcodeFormat.EAN_13, ZXing.BarcodeFormat.EAN_8,
    ZXing.BarcodeFormat.CODE_128, ZXing.BarcodeFormat.UPC_A, ZXing.BarcodeFormat.UPC_E,
  ]);
  hints.set(ZXing.DecodeHintType.TRY_HARDER, true);

  var reader = new ZXing.BrowserMultiFormatReader(hints);
  var lastScan = null;

  (function tick() {
    reader.decodeFromVideoElement(video)
      .then(function(r) {
        var bc = r.getText();
        if (bc && bc !== lastScan) {
          lastScan = bc;
          showSuccess(bc);
          sendValue(bc);
        }
        setTimeout(tick, 350);
      })
      .catch(function() { setTimeout(tick, 350); });
  })();
}

function showSuccess(bc) {
  document.getElementById("ok-val").textContent = bc;
  document.getElementById("ok").classList.add("show");
  document.getElementById("line").style.display = "none";
  document.getElementById("hint").style.display = "none";
  setStatus("✅ זוהה: " + bc);
}

function sendValue(bc) {
  try { Streamlit.setComponentValue(bc); return; } catch(e) {}
  // fallback — postMessage (works even without CDN in some Streamlit versions)
  try {
    window.parent.postMessage(
      { isStreamlitMessage: true, type: "streamlit:setComponentValue", value: bc },
      "*"
    );
  } catch(e) {}
}

function setStatus(msg) {
  var el = document.getElementById("status");
  if (el) el.textContent = msg;
}

// Kick off Streamlit integration once the CDN script tag has run
// (the onerror on the <script> tag handles CDN failure)
window.addEventListener("load", function() {
  if (typeof Streamlit !== "undefined") {
    initStreamlit();
  } else {
    startCamera(); // CDN didn't load — start directly
  }
});
</script>
</body>
</html>
